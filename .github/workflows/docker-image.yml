name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Git Semantic Version
      uses: PaulHatch/semantic-version@v6.0.2
      with:
        major_pattern: "major:"
        minor_pattern: "feat:"
        version_format: "${major}.${minor}.${patch}-prerelease${increment}"
      id: version

    - name: Docker login
      env:
        DOCKER_USER: ${{ secrets.DOCKER_USER }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      run: |
        docker login -u $DOCKER_USER -p $DOCKER_PASSWORD
         
    - name: Build Docker Image
      env:
         NEW_VERSION: ${{ steps.version.outputs.version }}
      run: |
        docker build -t josalam/graphql-actions:$NEW_VERSION .
        docker build -t josalam/graphql-actions:latest .

    - name: Push Docker Image
      env:
         NEW_VERSION: ${{ steps.version.outputs.version }}
      run: |
        docker push josalam/graphql-actions:$NEW_VERSION
        docker push josalam/graphql-actions:latest
        
    # - name: Build the Docker image
    #   run: docker build . --file Dockerfile --tag my-image-name:$(date +%s)
